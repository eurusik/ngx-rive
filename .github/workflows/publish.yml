name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish --dry-run (no actual publish)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build · Test · Publish
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Unit + integration tests
        run: npm run test:lib

      - name: Build library
        run: npm run build:lib

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./packages/ngx-rive/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Package version: $PKG_VERSION"
          echo "Tag version: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/ngx-rive/package.json').version")
          if [[ "$PKG_VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$PKG_VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$PKG_VERSION" == *"-rc"* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          elif [[ "$PKG_VERSION" == *"-"* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing with --tag $(cat $GITHUB_OUTPUT | grep tag= | cut -d= -f2)"

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run == true
        run: npm publish --dry-run --tag ${{ steps.dist-tag.outputs.tag }} --provenance --access public
        working-directory: dist/packages/ngx-rive
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry-run == false)
        run: npm publish --tag ${{ steps.dist-tag.outputs.tag }} --provenance --access public
        working-directory: dist/packages/ngx-rive
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
