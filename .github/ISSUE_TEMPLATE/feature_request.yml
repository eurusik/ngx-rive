name: Feature request
description: Propose a new API or change
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: Describe the use-case, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: Rough shape — types, example usage. It's fine to leave TODOs.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, similar APIs in other libraries.
